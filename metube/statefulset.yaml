apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: metube
  namespace: app-dev
spec:
  serviceName: metube-headless
  replicas: 2
  selector:
    matchLabels:
      app: metube
  template:
    metadata:
      labels:
        app: metube
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: metube
          image: ghcr.io/alexta69/metube:2026.05.30
          ports:
            - containerPort: 8081
          volumeMounts:
            - name: downloads
              mountPath: /downloads
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
        - name: rsyncd
          image: alpine:3.20
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          command:
            - /bin/sh
            - -c
            - "apk add --no-cache rsync > /dev/null && exec rsync --daemon --no-detach --config=/etc/rsyncd/rsyncd.conf"
          ports:
            - containerPort: 873
              name: rsync
          volumeMounts:
            - name: downloads
              mountPath: /downloads
            - name: rsyncd-conf
              mountPath: /etc/rsyncd
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: rsyncd-conf
          configMap:
            name: metube-rsyncd-conf
  volumeClaimTemplates:
    - metadata:
        name: downloads
      spec:
        storageClassName: local-path
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
